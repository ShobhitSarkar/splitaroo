name: Tests

on:
  push:
    branches: [ main ] 
  pull_request:
    branches: [ main ] 

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.14"

    - name: Install dependencies
      run: |
        uv sync

    - name: lint
      run: |
        source .venv/bin/activate && make tests